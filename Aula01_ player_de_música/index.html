<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h5>Player de Musica</h5>
    <img src="imagens/gess.png"> </img>
    <div id="corpo">
        <div id ="song-info">
            <div>nome da música</div>
            <div>nome da banda</div>
        </div>
        <div id="like" class="button"><i class="bi bi-hand-thumbs-up"></i></div>
    </div>

    <div>Barra de progresso</div>
    <div id="botao"> 
        <div id="shuffle" class="button"><i class="bi bi-skip-start"></i></div>
        <div id="previous" class="button"><i class="bi bi-play-circle-fill"></i></div>
        <div id="play" class="button button-navigate"><i class="bi bi-skip-end"></i></div>
        <div id="next" class="button button-navigate"><i class="bi bi-shuffle"></i></div>
        <div id="repeat" class="button"><i class="bi bi-repeat"></i></div>
    </div>
</body>
</html>
